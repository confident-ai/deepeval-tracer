name: "Confident PR Eval Gate"
description: "Runs your LLM app over a pinned Confident dataset and submits the outputs to Confident, which scores them and posts the PR check-run. Set up your app's runtime (Python + dependencies) in earlier steps; this action runs the pinned runner against it."

inputs:
  base_url:
    description: "Confident API base URL (region-specific)."
    required: true
  dataset_alias:
    description: "Alias of the pinned dataset to evaluate against."
    required: true
  dataset_version:
    description: "Dataset version to pull."
    required: false
    default: "latest"
  confident_api_key:
    description: "Confident project API key (injected as the CONFIDENT_API_KEY repo secret during setup)."
    required: true

runs:
  using: "composite"
  steps:
    # No Python setup here on purpose: the caller's workflow owns the runtime +
    # dependency install so the runner imports the app against the same
    # environment. The runner itself is stdlib-only.
    - name: Run Confident PR Eval Gate
      shell: bash
      run: python "${{ github.action_path }}/runner.py"
      env:
        CONFIDENT_BASE_URL: ${{ inputs.base_url }}
        CONFIDENT_API_KEY: ${{ inputs.confident_api_key }}
        DATASET_ALIAS: ${{ inputs.dataset_alias }}
        DATASET_VERSION: ${{ inputs.dataset_version }}
        REPO: ${{ github.repository }}
        REPO_ID: ${{ github.repository_id }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        BASE_BRANCH: ${{ github.base_ref || github.ref_name }}
